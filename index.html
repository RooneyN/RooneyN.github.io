<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎀 For You</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>

/* =====================
   TOKENS
   ===================== */
:root {
  --bg:         #fff0f5;
  --card:       #fffafc;
  --pink-light: #ffd6e7;
  --pink:       #ff85b3;
  --pink-deep:  #e05a8a;
  --text:       #5a2d4a;
  --text-soft:  #b07090;
  --shadow:     0 4px 28px rgba(224,90,138,0.13);
  --radius:     22px;
}

/* =====================
   RESET
   ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Quicksand', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* =====================
   FLOATING HEARTS
   ===================== */
#hearts-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.heart {
  position: absolute;
  bottom: -40px;
  opacity: 0;
  animation: floatUp linear infinite;
  user-select: none;
}
@keyframes floatUp {
  0%   { transform: translateY(0)      rotate(-10deg) scale(1);   opacity: 0;   }
  8%   { opacity: 0.55; }
  92%  { opacity: 0.28; }
  100% { transform: translateY(-105vh) rotate(14deg)  scale(0.5); opacity: 0;   }
}

/* =====================
   LOVE METER (top bar)
   ===================== */
#meter-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 90;
  height: 48px;
  background: rgba(255,240,245,0.93);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--pink-light);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 18px;
}
#meter-icon { font-size: 1.3rem; transition: transform 0.3s; }
#meter-track {
  flex: 1;
  height: 12px;
  background: var(--pink-light);
  border-radius: 999px;
  overflow: hidden;
}
#meter-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--pink), var(--pink-deep));
  border-radius: 999px;
  transition: width 0.9s cubic-bezier(.4,2,.4,1);
}
#meter-pct {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-soft);
  min-width: 32px;
  text-align: right;
}

/* =====================
   BOTTOM NAV
   ===================== */
#bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 90;
  background: rgba(255,240,245,0.93);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid var(--pink-light);
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 10px 16px 14px;
}
.nav-btn {
  background: var(--pink-light);
  border: none;
  border-radius: 999px;
  padding: 9px 20px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  color: var(--text);
  cursor: pointer;
  transition: background 0.18s, transform 0.1s;
}
.nav-btn:active { transform: scale(0.94); }
.nav-btn:hover  { background: var(--pink); color: #fff; }

/* =====================
   SCREEN WRAPPER
   ===================== */
#screen-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 64px 16px 90px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* =====================
   CARD
   ===================== */
.card {
  width: 100%;
  max-width: 460px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 30px 24px 28px;
  position: relative;
  animation: cardIn 0.35s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =====================
   TYPOGRAPHY
   ===================== */
.script {
  font-family: 'Dancing Script', cursive;
  color: var(--pink-deep);
}
h1.script { font-size: 2.2rem; margin-bottom: 6px; }
h2.script { font-size: 1.6rem; margin-bottom: 10px; }
p {
  line-height: 1.75;
  color: var(--text);
  font-size: 0.97rem;
  margin-bottom: 12px;
}
.soft { color: var(--text-soft); font-size: 0.9rem; }
hr { border: none; border-top: 1px solid var(--pink-light); margin: 18px 0; }

/* =====================
   BUTTONS
   ===================== */
.btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--pink), var(--pink-deep));
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 14px 34px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(224,90,138,0.28);
  transition: transform 0.15s, box-shadow 0.15s;
  text-decoration: none;
  margin: 5px 4px;
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224,90,138,0.38); }
.btn:active { transform: scale(0.96); }
.btn-ghost {
  background: var(--pink-light);
  color: var(--text);
  box-shadow: none;
}
.btn-ghost:hover { background: var(--pink-light); transform: translateY(-1px); }
.center { text-align: center; }

/* =====================
   PASSWORD INPUT
   ===================== */
.pw-wrap { margin: 14px 0; }
.pw-input {
  width: 100%;
  border: 2px solid var(--pink-light);
  border-radius: 999px;
  padding: 13px 20px;
  font-family: 'Quicksand', sans-serif;
  font-size: 1rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  text-align: center;
  letter-spacing: 2px;
  transition: border-color 0.2s;
  display: block;
  margin-bottom: 8px;
}
.pw-input:focus { border-color: var(--pink); }
.pw-msg {
  min-height: 1.3em;
  font-size: 0.88rem;
  text-align: center;
  color: #d05050;
  transition: color 0.2s;
}
.pw-msg.ok { color: var(--pink-deep); }

/* =====================
   YES/NO BUTTONS
   ===================== */
#no-btn {
  display: inline-block;
  background: var(--pink-light);
  color: var(--text-soft);
  border: none;
  border-radius: 999px;
  padding: 14px 32px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.35s ease;
  margin: 5px 4px;
}
#yes-btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--pink), var(--pink-deep));
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 14px 34px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(224,90,138,0.28);
  transition: all 0.4s cubic-bezier(.4,2,.4,1);
  margin: 5px 4px;
}

/* =====================
   GACHA CAPSULE
   ===================== */
.gacha {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
}
.capsule-icon {
  font-size: 3.8rem;
  display: block;
  animation: capPop 0.55s cubic-bezier(.4,2,.4,1) both;
}
@keyframes capPop {
  from { transform: scale(0) rotate(-18deg); opacity: 0; }
  60%  { transform: scale(1.25) rotate(4deg); opacity: 1; }
  to   { transform: scale(1) rotate(0); opacity: 1; }
}
.capsule-reveal {
  margin-top: 14px;
  width: 100%;
  background: var(--bg);
  border: 2px dashed var(--pink);
  border-radius: 16px;
  padding: 18px;
  animation: fadeUp 0.4s 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =====================
   POLAROIDS
   ===================== */
.scrapbook {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  padding: 8px 0 12px;
}
.polaroid {
  background: #fff;
  padding: 12px 12px 36px;
  box-shadow: 2px 4px 16px rgba(90,45,74,0.14);
  width: 130px;
  text-align: center;
  transform: rotate(var(--rot, -2deg));
  animation: pinDrop 0.45s cubic-bezier(.4,2,.4,1) both;
}
@keyframes pinDrop {
  from { transform: scale(0) rotate(var(--rot,-2deg)); opacity: 0; }
  to   { transform: scale(1) rotate(var(--rot,-2deg)); opacity: 1; }
}
.pol-pic  { font-size: 2.6rem; display: block; background: var(--bg); padding: 8px 0; margin-bottom: 8px; }
.pol-cap  { font-family: 'Dancing Script', cursive; font-size: 0.88rem; color: var(--text-soft); line-height: 1.3; }

/* =====================
   DEV DIARY
   ===================== */
.diary-toggle {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--pink-light);
  border: none;
  border-radius: 999px;
  width: 32px; height: 32px;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-soft);
  transition: background 0.18s;
}
.diary-toggle:hover { background: var(--pink); color: #fff; }
.diary-content {
  display: none;
  margin-top: 14px;
  padding: 12px 14px;
  background: var(--bg);
  border-left: 3px solid var(--pink);
  border-radius: 0 12px 12px 0;
  font-size: 0.84rem;
  color: var(--text-soft);
  font-style: italic;
  line-height: 1.6;
}
.diary-content.open { display: block; }

/* =====================
   LETTER HUB OVERLAY
   ===================== */
#letter-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(90,45,74,0.28);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#letter-overlay.open { display: flex; }
#letter-panel {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 460px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 28px 22px 24px;
  position: relative;
  animation: cardIn 0.3s ease both;
}
.fragment {
  background: var(--bg);
  border-left: 3px solid var(--pink);
  border-radius: 0 12px 12px 0;
  padding: 13px 15px;
  margin-bottom: 10px;
  font-size: 0.93rem;
  line-height: 1.7;
  animation: fadeUp 0.35s ease both;
}
#letter-close {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--pink-light);
  border: none;
  border-radius: 999px;
  width: 34px; height: 34px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* =====================
   GAMES PANEL
   ===================== */
#games-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(90,45,74,0.2);
  z-index: 200;
}
#games-overlay.open { display: block; }
#games-panel {
  position: fixed;
  top: 0; right: -320px;
  width: 290px;
  height: 100vh;
  background: var(--card);
  box-shadow: -4px 0 28px rgba(90,45,74,0.14);
  z-index: 201;
  padding: 56px 22px 22px;
  overflow-y: auto;
  transition: right 0.32s cubic-bezier(.4,0,.2,1);
}
#games-panel.open { right: 0; }
#games-close {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--pink-light);
  border: none;
  border-radius: 999px;
  width: 34px; height: 34px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#games-panel h2 { margin-bottom: 14px; }
#games-panel ul { list-style: none; }
#games-panel li {
  padding: 10px 0;
  border-bottom: 1px solid var(--pink-light);
  font-size: 0.93rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* =====================
   LOCKED STAGE LABEL
   ===================== */
.locked-label {
  color: var(--text-soft);
  font-style: italic;
  font-size: 0.9rem;
  padding: 10px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* =====================
   SPLASH PULSE
   ===================== */
.big-heart {
  font-size: 5rem;
  display: block;
  text-align: center;
  margin: 16px 0;
  animation: hbeat 1.9s ease-in-out infinite;
}
@keyframes hbeat {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.13); }
}

/* =====================
   VERIFY ITEMS
   ===================== */
.verify-item {
  background: var(--bg);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.verify-q { font-weight: 700; font-size: 0.93rem; margin-bottom: 6px; }
.verify-a { color: var(--text-soft); font-size: 0.88rem; }

</style>
</head>
<body>

<!-- Hearts -->
<div id="hearts-bg"></div>

<!-- Love meter -->
<div id="meter-bar">
  <span id="meter-icon">🤍</span>
  <div id="meter-track"><div id="meter-fill"></div></div>
  <span id="meter-pct">0%</span>
</div>

<!-- Bottom nav -->
<div id="bottom-nav">
  <button class="nav-btn" onclick="openLetterHub()">💌 Your Letter</button>
  <button class="nav-btn" onclick="openGames()">🎮 Our Games</button>
</div>

<!-- Letter hub overlay -->
<div id="letter-overlay">
  <div id="letter-panel">
    <button id="letter-close" onclick="closeLetterHub()">✕</button>
    <h2 class="script">💌 Letters for You</h2>
    <div id="letter-body">
      <p class="soft">Nothing yet — get unlocking! 🔑</p>
    </div>
  </div>
</div>

<!-- Games panel -->
<div id="games-overlay" onclick="closeGames()"></div>
<div id="games-panel">
  <button id="games-close" onclick="closeGames()">✕</button>
  <h2 class="script">🎮 Our Games</h2>
  <p class="soft" style="margin-bottom:12px;">Every game we've played together 💕</p>
  <ul>
    <!-- =============================================
         FILL IN: Add every game you've played below
         Format: <li>🎮 Game Name</li>
         ============================================= -->
    <li>🌿 Stardew Valley</li>
    <li>🏝️ Animal Crossing</li>
    <li>🗡️ The Legend of Zelda</li>
    <!-- Add more here -->
  </ul>
</div>

<!-- Screen -->
<div id="screen-wrap">
  <div id="app"></div>
</div>

<!-- Audio elements -->
<audio id="audio-ambient" loop>
  <!-- FILL IN: <source src="YOUR_AMBIENT.mp3" type="audio/mpeg"> -->
</audio>
<audio id="audio-unlock">
  <!-- FILL IN: <source src="YOUR_UNLOCK.mp3" type="audio/mpeg"> -->
</audio>
<audio id="audio-click">
  <!-- FILL IN: <source src="YOUR_CLICK.mp3" type="audio/mpeg"> -->
</audio>

<script>
/* ============================================================
   STATE
   ============================================================ */
var S = {
  love:         0,
  letterParts:  [],
  unlockedTo:   0,   /* 0=none, 1=s1, 2=s2, 3=s3, 4=s4, 5=final */
  cheatUsed:    false
};

/* ============================================================
   PASSWORDS — FILL THESE IN
   ============================================================ */
var PASSWORDS = {
  gate:    'birthday',    /* Entry password she types on the first screen */
  stage2:  'stage2code',  /* Code you text her to unlock stage 2          */
  stage3:  'stage3code',  /* Code you text her to unlock stage 3          */
  stage4:  'stage4code',  /* Code you text her to unlock stage 4          */
  final:   'finalcode',   /* Code you text her to unlock the final stage  */
  cheat:   'superlove'    /* Cheat code — unlocks everything at once      */
};

/* ============================================================
   ROUTER — call goto('screenName') to navigate
   ============================================================ */
var currentScreen = '';

function goto(name) {
  currentScreen = name;
  var app = document.getElementById('app');
  app.innerHTML = '';
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = SCREENS[name]();
  app.appendChild(card);
  window.scrollTo(0, 0);
}

/* ============================================================
   LOVE METER
   ============================================================ */
function setLove(val) {
  S.love = Math.max(S.love, Math.min(val, 100));
  document.getElementById('meter-fill').style.width = S.love + '%';
  document.getElementById('meter-pct').textContent  = S.love + '%';
  var icon = document.getElementById('meter-icon');
  if      (S.love < 25)  icon.textContent = '🤍';
  else if (S.love < 55)  icon.textContent = '🩷';
  else if (S.love < 85)  icon.textContent = '💗';
  else                   icon.textContent = '💕';
}

/* ============================================================
   LETTER HUB
   ============================================================ */
function addLetter(text) {
  if (S.letterParts.indexOf(text) === -1) S.letterParts.push(text);
}

function openLetterHub() {
  var body = document.getElementById('letter-body');
  if (S.letterParts.length === 0) {
    body.innerHTML = '<p class="soft">Nothing yet — get unlocking! 🔑</p>';
  } else {
    body.innerHTML = S.letterParts.map(function(p) {
      return '<div class="fragment">' + p + '</div>';
    }).join('');
  }
  document.getElementById('letter-overlay').classList.add('open');
}
function closeLetterHub() {
  document.getElementById('letter-overlay').classList.remove('open');
}

/* ============================================================
   GAMES PANEL
   ============================================================ */
function openGames()  {
  document.getElementById('games-panel').classList.add('open');
  document.getElementById('games-overlay').classList.add('open');
}
function closeGames() {
  document.getElementById('games-panel').classList.remove('open');
  document.getElementById('games-overlay').classList.remove('open');
}

/* ============================================================
   AUDIO
   ============================================================ */
function startAudio() {
  var a = document.getElementById('audio-ambient');
  if (a) { a.volume = 0.35; a.play().catch(function(){}); }
}
function playUnlock() {
  var a = document.getElementById('audio-unlock');
  if (a) { a.currentTime = 0; a.play().catch(function(){}); }
}
function playClick() {
  var a = document.getElementById('audio-click');
  if (a) { a.currentTime = 0; a.play().catch(function(){}); }
}

/* ============================================================
   DEV DIARY TOGGLE
   ============================================================ */
function toggleDiary(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

/* ============================================================
   GROWING YES BUTTON
   ============================================================ */
var yesStage = 0;
var yesTexts = ['Yes! 🎀', 'Please? 🥺', 'Pretty please? 💕', "I'll give you a kiss! 😘"];
var yesPad   = [14, 18, 24, 32];
var yesPx    = [34, 44, 60, 80];
var yesFs    = [1, 1.3, 1.7, 2.1];

function pressNo() {
  playClick();
  yesStage = Math.min(yesStage + 1, yesTexts.length - 1);
  var noBtn  = document.getElementById('no-btn');
  var yesBtn = document.getElementById('yes-btn');
  if (!noBtn || !yesBtn) return;
  /* shrink no */
  var noScale = Math.max(0.45, 1 - yesStage * 0.18);
  noBtn.style.transform = 'scale(' + noScale + ')';
  noBtn.style.opacity   = String(Math.max(0.25, 1 - yesStage * 0.28));
  if (yesStage >= yesTexts.length - 1) noBtn.style.visibility = 'hidden';
  /* grow yes */
  yesBtn.textContent    = yesTexts[yesStage];
  yesBtn.style.fontSize = yesFs[yesStage] + 'rem';
  yesBtn.style.padding  = yesPad[yesStage] + 'px ' + yesPx[yesStage] + 'px';
}

function pressYes() {
  playUnlock();
  yesStage = 0;
  goto('hub');
}

/* ============================================================
   PASSWORD CHECKS
   ============================================================ */
function checkGate() {
  var val = document.getElementById('pw-gate').value.toLowerCase().trim();
  var msg = document.getElementById('pw-gate-msg');
  if (val === PASSWORDS.gate) {
    playUnlock();
    goto('verify');
  } else {
    msg.textContent = "Hmm, that's not right 🙈 try again?";
    msg.className = 'pw-msg';
    document.getElementById('pw-gate').value = '';
    playClick();
  }
}

function checkStageCode() {
  var val = document.getElementById('pw-stage').value.toLowerCase().trim();
  var msg = document.getElementById('pw-stage-msg');
  if (!val) return;

  if (val === PASSWORDS.cheat) {
    playUnlock();
    S.unlockedTo = 5;
    S.love = 100;
    setLove(100);
    addLetter('🎁 Gift 1 — <!-- FILL IN: first gift summary -->');
    addLetter('🎁 Gift 2 — <!-- FILL IN: second gift summary -->');
    addLetter('🎁 Gift 3 — <!-- FILL IN: third gift summary -->');
    addLetter('🎁 Gift 4 — <!-- FILL IN: fourth gift summary -->');
    addLetter('💌 <!-- FILL IN: final letter text for cheat mode -->');
    goto('cheat');
    return;
  }

  var stageMap = {
    [PASSWORDS.stage2]: { to: 2, love: 25, label: 'Stage 2 unlocked! 🎁' },
    [PASSWORDS.stage3]: { to: 3, love: 50, label: 'Stage 3 unlocked! 🎁' },
    [PASSWORDS.stage4]: { to: 4, love: 75, label: 'Stage 4 unlocked! 🎁' },
    [PASSWORDS.final]:  { to: 5, love: 90, label: 'Final stage unlocked! 🎀' }
  };

  if (stageMap[val]) {
    var data = stageMap[val];
    if (S.unlockedTo < data.to) S.unlockedTo = data.to;
    setLove(data.love);
    playUnlock();
    msg.textContent = '✨ ' + data.label;
    msg.className = 'pw-msg ok';
    document.getElementById('pw-stage').value = '';
    setTimeout(function() {
      if (msg) { msg.textContent = ''; msg.className = 'pw-msg'; }
      goto('hub');
    }, 1800);
  } else {
    msg.textContent = "That code doesn't work yet 🔒 check your messages!";
    msg.className = 'pw-msg';
    document.getElementById('pw-stage').value = '';
    playClick();
  }
}

/* enter key support for password inputs */
function pwKeyGate(e)  { if (e.key === 'Enter') checkGate(); }
function pwKeyStage(e) { if (e.key === 'Enter') checkStageCode(); }

/* ============================================================
   FLOATING HEARTS — spawn on load
   ============================================================ */
(function() {
  var bg      = document.getElementById('hearts-bg');
  var symbols = ['🤍','💕','💗','💓','🩷','✨','🌸','🫧'];
  for (var i = 0; i < 20; i++) {
    var h    = document.createElement('span');
    h.className   = 'heart';
